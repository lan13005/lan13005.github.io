name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # needed for git diff to detect cv/ changes

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Node dependencies
        run: npm ci

      - name: Generate experience content from CV YAML
        run: uv run cv/build.py --content-only

      - name: Build CV PDF (if cv/ changed)
        run: |
          # Check if any file in cv/ changed in this push
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE '^cv/'; then
            echo "cv/ changed — building PDF"
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends \
              texlive-latex-base texlive-fonts-recommended texlive-fonts-extra
            uv run cv/build.py --pdf
          else
            echo "cv/ unchanged — skipping PDF build"
          fi

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
