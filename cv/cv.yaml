experience:
  - id: postdoc-jlab
    role: 'Postdoctoral Fellow'
    org: 'Thomas Jefferson National Accelerator Facility (JLab)'
    location: 'Newport News, VA'
    start: '2023-07-01'
    end: ~ # null → "Present"
    summary: >
      Developing non-parametric statistical frameworks and end-to-end analysis pipelines
      for hadron physics using Python, JAX, and OpenMPI.
    tags: [python, jax, openmpi, gaussian-processes, variational-inference, normalizing-flows]
    bullets:
      - text: >
          Developing a declarative framework for smooth non-parametric statistical models
          using Python, JAX, and OpenMPI with Gaussian Processes and Variational Inference,
          enabling Bayesian inference over O(10^6) free parameters.
        latex_text: >
          Developing a declarative framework to construct smooth non-parametric statistical
          models for physics analysis using Python, JAX, and OpenMPI utilizing Gaussian
          Processes and Variational Inference techniques allowing Bayesian inference over
          $\mathcal{O}(10^6)$ free parameters.
        link: 'https://github.com/fmkroci/iftpwa'
      - text: >
          Built an end-to-end analysis pipeline generating physics events from a model,
          emulating detector efficiency via normalizing flows, and interfacing with both
          Bayesian- and frequentist-based optimization frameworks for rapid closure tests.
        link: 'https://github.com/lan13005/PyAmpTools'
      - text: >
          Created Python bindings for the collaboration's C++ analysis software, providing
          a more dynamic interaction that simplifies workflows.
      - text: >
          Created and maintain user-friendly documentation for the above software to ensure
          long-term sustainability and guide future developers.

  - id: research-assistant-fsu
    role: 'Research Assistant'
    org: 'Florida State University'
    location: 'Tallahassee, FL'
    start: '2016-08-01'
    end: '2023-05-31'
    summary: >
      Published research in top physics journals applying deep learning and Bayesian
      methods to hadron spectroscopy and supernova cosmology.
    tags: [python, pytorch, cpp, mcmc, bayesian-inference, deep-learning, vaes]
    bullets:
      - text: >
          Developed a framework using Deep Neural Networks to determine the nature of exotic
          hadrons from their spectra, utilizing Shapley values to understand feature
          importance.
        publication: 'Physical Review D'
      - text: >
          Collaborated with observational astronomers to develop a conditional variational
          autoencoder for generating template supernova spectra, reducing a class of
          systematic uncertainties by ~90%.
        publication: 'The Astrophysical Journal'
      - text: >
          Implemented a computationally intensive background subtraction technique in C++
          with multiprocessing support, improving analysis efficiency for large datasets.
        link: 'https://github.com/lan13005/Q-Factors'
      - text: >
          Applied maximum likelihood optimization, Markov Chain Monte Carlo, and model
          selection methods to complex real-world physics problems.

